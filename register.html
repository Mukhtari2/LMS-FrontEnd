<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Register</title>
</head>
<body class="flex flex-col min-h-screen">
  <header  class="sticky top-0 z-50 w-full">
    <nav class="flex items-center justify-between px-6 py-4 lg:px-12 bg-gray-900/90 backdrop-blur-md border-b border-white/10 text-white transition-all duration-300 gap-4">
      <h2 class="text-3xl lg:text-4xl font-black tracking-tighter hover:scale-105 transition-transform cursor-pointer text-white">
        Enesi<span class="bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent">Pay</span>
      </h2>
      <button id="menu-btn" class="block lg:hidden focus:outline-none">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
      </button>
      <ul id="menu" class="hidden absolute top-full left-0 w-full bg-gray-700 lg:bg-transparent flex-col gap-4 p-6 lg:static lg:w-auto lg:flex lg:flex-row lg:gap-4 lg:p-0 items-center transition-all duration-300 z-50">
        <li><a href="index.html" class="relative text-[19px] lg:text-base font-medium opacity-80 hover:opacity-100 transition-opacity after:content-[''] after:absolute after:left-0 after:bottom-[-4px] after:w-0 after:h-[2px] after:bg-green-400 hover:after:w-full after:transition-all after:duration-300">Home</a></li>
        <li><a href="#about" class="relative text-[19px] lg:text-base font-medium opacity-80 hover:opacity-100 transition-opacity after:content-[''] after:absolute after:left-0 after:bottom-[-4px] after:w-0 after:h-[2px] after:bg-green-400 hover:after:w-full after:transition-all after:duration-300">About Us</a></li>
       <li><a href="login.html" class="text-[19px] lg:text-sm font-semibold hover:text-blue-400 transition-colors">Login</a></li>
        <li><a href="register.html" class="text-[19px] lg:text-sm bg-blue-600 hover:bg-blue-500 px-7 py-2.5 rounded-full font-bold shadow-lg shadow-blue-500/20 active:scale-95 transition-all cursor-pointer">Register</a></li>
  </ul>
    </nav>
  </header>

  <main class="flex-grow flex items-center justify-center py-10 lg:py-20 px-4 bg-gray-50/50">
    <div class="w-full max-w-[500px] bg-white p-5 rounded-[2rem] shadow-2xl shadow-blue-500/5 border border-gray-100 transition-all duration-500 hover:shadow-blue-500/10">
      
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-green-50 rounded-2xl mb-4">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
          </svg>
        </div>
        <h2 class="text-4xl font-black text-gray-900 tracking-tight">Create Account</h2>
        <p class="text-gray-500 mt-3 font-medium">Join <span class="text-blue-600 font-bold">Mukhtar</span> and start managing your assets.</p>
      </div>
  
     
      <form action="" method="post" class="space-y-5">
        
        
        <div class="space-y-1.5">
          <label for="name" class="block text-sm font-bold text-gray-700 ml-1">Full Name</label>
          <input type="text" id="name" name="name" required 
            class="w-full px-5 py-3.5 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-300 placeholder:text-gray-400 text-gray-900 font-medium" 
            placeholder="e.g. Mukhtar Suleiman">
        </div>
  
        <div class="space-y-1.5">
          <label for="email" class="block text-sm font-bold text-gray-700 ml-1">Email Address</label>
          <input type="email" id="email" name="email" required 
            class="w-full px-5 py-3.5 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-300 placeholder:text-gray-400 text-gray-900 font-medium" 
            placeholder="name@example.com">
        </div>
  
        <div class="space-y-1.5">
          <label for="phone-number" class="block text-sm font-bold text-gray-700 ml-1">Phone Number</label>
          <input type="text" id="phone-number" name="phone-number" required 
            class="w-full px-5 py-3.5 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-300 placeholder:text-gray-400 text-gray-900 font-medium" 
            placeholder="+234 (81) 0000-0000">
        </div>
  
        <div class="space-y-1.5">
          <label for="password" class="block text-sm font-bold text-gray-700 ml-1">Password</label>
          <input type="password" id="password" name="password" required 
            class="w-full px-5 py-3.5 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-300 placeholder:text-gray-400 text-gray-900 font-medium" 
            placeholder="••••••••••••">
        </div>
  
        <button type="submit" 
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-600/20 active:scale-[0.98] transition-all duration-300 mt-6 tracking-wide">
          Create My Account
        </button>
  
        <p class="text-center text-sm font-medium text-gray-500 pt-4">
          Already have an account? <a href="login.html" class="text-blue-600 font-bold hover:underline">Log in</a>
        </p>
      </form>
    </div>
  </main>


    <footer class="bg-gray-900 border-t border-white/5">
      <div class="mx-auto max-w-screen-xl px-6 py-5">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between pt-8 gap-4">
          
          <span class="text-sm text-gray-500 font-medium">
            © 2026 <span class="text-gray-400">Dev Wallet</span>. All Rights Reserved.
          </span>
    
          <div class="flex items-center gap-6">
            <a href="https://facebook.com/mukhtar.suleiman2" class="group text-gray-500 hover:text-blue-500 transition-all duration-300">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M13.135 6H15V3h-1.865a4.147 4.147 0 0 0-4.142 4.142V9H7v3h2v9.938h3V12h2.021l.592-3H12V6.591A.6.6 0 0 1 12.592 6h.543Z"/></svg>
              <span class="sr-only">Facebook</span>
            </a>
            
            <a href="https://x.com/mukhab" class="group text-gray-500 hover:text-white transition-all duration-300">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M13.795 10.533 20.68 2h-3.073l-5.255 6.517L7.69 2H1l7.806 10.91L1.47 22h3.074l5.705-7.07L15.31 22H22l-8.205-11.467Zm-2.38 2.95L9.97 11.464 4.36 3.627h2.31l4.528 6.317 1.443 2.02 6.018 8.409h-2.31l-4.934-6.89Z"/></svg>
              <span class="sr-only">Twitter</span>
            </a>
    
            <a href="https://github.com/Mukhtari2" class="group text-gray-500 hover:text-green-400 transition-all duration-300">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12.006 2a9.847 9.847 0 0 0-6.484 2.44 10.32 10.32 0 0 0-3.393 6.17 10.48 10.48 0 0 0 1.317 6.955 10.045 10.045 0 0 0 5.4 4.418c.504.095.683-.223.683-.494 0-.245-.01-1.052-.014-1.908-2.78.62-3.366-1.21-3.366-1.21a2.711 2.711 0 0 0-1.11-1.5c-.907-.637.07-.621.07-.621.317.044.62.163.885.346.266.183.487.426.647.71.135.253.318.476.538.655a2.079 2.079 0 0 0 2.37.196c.045-.52.27-1.006.635-1.37-2.219-.259-4.554-1.138-4.554-5.07a4.022 4.022 0 0 1 1.031-2.75 3.77 3.77 0 0 1 .096-2.713s.839-.275 2.749 1.05a9.26 9.26 0 0 1 5.004 0c1.906-1.325 2.74-1.05 2.74-1.05.37.858.406 1.828.101 2.713a4.017 4.017 0 0 1 1.029 2.75c0 3.939-2.339 4.805-4.564 5.058a2.471 2.471 0 0 1 .679 1.897c0 1.372-.012 2.477-.012 2.814 0 .272.18.592.687.492a10.05 10.05 0 0 0 5.388-4.421 10.473 10.473 0 0 0 1.313-6.948 10.32 10.32 0 0 0-3.39-6.165A9.847 9.847 0 0 0 12.007 2Z" clip-rule="evenodd"/></svg>
              <span class="sr-only">GitHub</span>
            </a>
          </div>
    
        </div>
      </div>
    </footer>
    
    <script>
      const btn = document.getElementById('menu-btn');
      const menu = document.getElementById('menu');
    
      btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
        menu.classList.toggle('flex');
      });
    </script>
</body>
</html>
