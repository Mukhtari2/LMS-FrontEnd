    <title>Login</title>

  <body class="flex flex-col min-h-screen">
    <header>
      <nav class="flex items-center justify-between p-5 bg-gray-700 text-white static">
        <img src="" alt="logo">
        <ul class="flex gap-3">
          <li><a href="index.html">Home</a></li>
          <li><a href="about-us.html" >About Us</a></li>
          <li><a href="register.html" target="_blank" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-lg hover:shadow-blue-500/30 transition-all duration-300 transform hover:-translate-y-1 mt-5 cursor-pointer">Register</a></li>
          <li><a href="login.html" target="_blank" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-lg hover:shadow-blue-500/30 transition-all duration-300 transform hover:-translate-y-1 mt-5 cursor-pointer">Login</a></li>
        </ul>
      </nav>
    </header>

     <main class="flex-grow flex items-center justify-center py-12 px-4">
      <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Login</h2>
        <p class="text-gray-500 mt-2">we are happy to have you back! 🙌</p>
      </div>

      <div class="max-w-md mx-auto mt-10 p-5 border rounded bg-gray-100 space-y-5 border border-gray-100 rounded-2xl">
        <form action="" method="post">
        
          <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email:</label>
            <input type="email" id="email" name="email" required   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition duration-200" 
               placeholder="eg.mywallet@gmail.com">
          </div>
          <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password:</label>
            <input type="password" id="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition duration-200" 
               placeholder="***********">
          </div>

          <button type="button" onclick="window.location.href='dashboard.html';" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-lg hover:shadow-blue-500/30 transition-all duration-300 transform hover:-translate-y-1 mt-5 cursor-pointer">login</button>
        </form>
      </div>
    </main>
