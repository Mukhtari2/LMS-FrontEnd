<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" />
    <script
      src="https://kit.fontawesome.com/6ce543c97f.js"
      crossorigin="anonymous"
    ></script>
    <title>My Wallets | DevWallet</title>
  </head>
  <body class="bg-[#0b0e11] text-gray-100 font-sans antialiased min-h-screen">
    <div class="max-w-6xl mx-auto p-6 lg:p-12">
      <header class="flex items-center justify-between mb-12">
        <div>
          <a
            href="dashboard.html"
            class="text-blue-400 text-sm font-medium hover:underline flex items-center gap-2 mb-2"
          >
            <i class="fa-solid fa-arrow-left"></i> Dashboard
          </a>
          <h1 class="text-3xl font-bold tracking-tight">My Wallets</h1>
        </div>

        <button
          class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-2xl font-bold transition-all shadow-lg shadow-blue-900/40"
        >
          <i class="fa-solid fa-plus mr-2"></i> Add New Wallet
        </button>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
          <div class="relative group cursor-pointer">
            <div
              class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-[2.5rem] blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"
            ></div>
            <div
              class="relative bg-gradient-to-br from-blue-600 to-indigo-900 p-8 rounded-[2.5rem] shadow-2xl"
            >
              <div class="flex justify-between items-start mb-10">
                <div>
                  <p
                    class="text-blue-100/70 text-xs uppercase tracking-widest font-bold"
                  >
                    Personal Account
                  </p>
                  <h2 class="text-3xl font-bold mt-1">₦5,600,890.00</h2>
                </div>
                <i class="fa-brands fa-cc-visa text-4xl text-white/80"></i>
              </div>
              <div class="flex justify-between items-end">
                <p class="font-mono tracking-widest text-lg">
                  **** **** **** 4290
                </p>
                <span
                  class="bg-white/20 px-3 py-1 rounded-lg text-xs font-bold backdrop-blur-md"
                  >PRIMARY</span
                >
              </div>
            </div>
          </div>

          <div
            class="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] hover:bg-white/[0.08] transition-all group"
          >
            <div class="flex justify-between items-center">
              <div class="flex items-center gap-5">
                <div
                  class="w-14 h-14 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-emerald-500 text-xl"
                >
                  <i class="fa-solid fa-piggy-bank"></i>
                </div>
                <div>
                  <p class="text-gray-400 text-sm font-medium">
                    Emergency Fund
                  </p>
                  <p class="text-2xl font-bold">₦2,450,000.00</p>
                </div>
              </div>
              <button
                class="text-gray-500 hover:text-white transition-colors text-xl"
              >
                <i class="fa-solid fa-ellipsis-vertical"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="space-y-6">
          <div
            class="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] backdrop-blur-xl"
          >
            <h3 class="text-lg font-bold mb-6">Quick Transfer</h3>
            <div class="space-y-4">
              <div>
                <label
                  class="text-xs text-gray-500 font-bold uppercase mb-2 block ml-1"
                  >Recipient</label
                >
                <input
                  type="text"
                  placeholder="Wallet ID or Email"
                  class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500/40 text-sm"
                />
              </div>
              <div>
                <label
                  class="text-xs text-gray-500 font-bold uppercase mb-2 block ml-1"
                  >Amount</label
                >
                <div class="relative">
                  <span
                    class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-gray-400"
                    >₦</span
                  >
                  <input
                    type="number"
                    placeholder="0.00"
                    class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-8 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500/40 text-sm font-bold"
                  />
                </div>
              </div>
              <button
                class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-blue-400 hover:text-white transition-all active:scale-95"
              >
                Send Money
              </button>
            </div>
          </div>

          <div
            class="p-6 rounded-[2rem] bg-amber-500/10 border border-amber-500/20"
          >
            <div class="flex gap-4">
              <i
                class="fa-solid fa-shield-halved text-amber-500 text-xl mt-1"
              ></i>
              <div>
                <p class="text-amber-500 font-bold text-sm">Security Tip</p>
                <p class="text-gray-400 text-xs mt-1 leading-relaxed">
                  Never share your wallet keys or password with anyone.
                  DevWallet will never ask for your PIN.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
