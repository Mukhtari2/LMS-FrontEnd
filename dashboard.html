<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Dashboard</title>
  </head>
  <body>
  <header>
    <nav class="flex flex-row bg-black bg-opacity-90 text-gray-100 justify-center py-2 gap-5"> 
           <a href="#" class="bg-blue-800 py-3 px-4 rounded transition duration-200 hover:bg-gray-800 hover:text-blue-400 mb-2">Dashboard</a>      
            <a href="#" class="bg-blue-800 py-3 px-4 rounded transition duration-200 hover:bg-gray-800 hover:text-blue-400 mb-2">Transactions</a>      
            <a href="#" class="bg-blue-800 py-3 px-4 rounded transition duration-200 hover:bg-gray-800 hover:text-blue-400 mb-2">Wallets</a> 
    </nav>
  </header>

 <div class="flex min-h-screen bg-[#0f1113] text-gray-100 font-sans">
  
  <!-- Sidebar -->
  <aside class="w-64 bg-black/40 border-r border-white/5 backdrop-blur-xl fixed h-full z-20">
    <div class="p-6">
      <div class="text-2xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent mb-8">
        FinVault
      </div>
      
      <nav class="space-y-1">
        <a href="#" class="flex items-center gap-3 bg-blue-600/10 text-blue-400 py-3 px-4 rounded-xl transition-all font-medium">
          <span>Dashboard</span>
        </a>      
        <a href="#" class="flex items-center gap-3 text-gray-400 py-3 px-4 rounded-xl transition-all hover:bg-white/5 hover:text-white">
          <span>Transactions</span>
        </a>      
        <a href="#" class="flex items-center gap-3 text-gray-400 py-3 px-4 rounded-xl transition-all hover:bg-white/5 hover:text-white">
          <span>Wallets</span>
        </a>
      </nav>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 ml-64 p-8">
    
    <!-- Top Action Bar -->
    <div class="flex items-center justify-between mb-10">
      <div class="relative w-96">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </span>
        <input type="search" placeholder="Search analytics..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-2.5 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-sm">
      </div>
      
      <!-- Profile section (from previous step) goes here -->
    </div>

    <!-- Stats Grid / Wallet Card -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="col-span-1 bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-[2rem] shadow-xl shadow-blue-900/20 relative overflow-hidden">
        <!-- Decorative Circle -->
        <div class="absolute -right-10 -top-10 h-40 w-40 bg-white/10 rounded-full blur-3xl"></div>
        
        <div class="relative z-10">
          <h2 class="text-blue-100 text-sm font-medium opacity-80 mb-1">Total Wallet Balance</h2>
          <p class="text-3xl font-bold tracking-tight mb-6">₦5,890.00</p> 
          
          <button class="w-full bg-white text-blue-700 font-bold py-3 rounded-xl hover:bg-blue-50 transition-colors shadow-lg active:scale-[0.98]">
            + Top Up Wallet
          </button>
        </div>
      </div>
      
      <!-- Placeholder for other stats -->
      <div class="bg-white/5 border border-white/10 p-6 rounded-[2rem]">
         <h2 class="text-gray-400 text-sm font-medium mb-1">Monthly Spend</h2>
         <p class="text-2xl font-bold">₦1,200.00</p>
      </div>
    </div>

  </main>
</div>
  </body>
</html>
